<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a = parseInt(prompt("digite um numero:"))
        var b = parseInt(prompt("digite o outro numero:"))
        document.write("quociente:" + parseInt(a / b) "<br>" )
        document.write("resto:" + (a %b))
    </script>
</body>
